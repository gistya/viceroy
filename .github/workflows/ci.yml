name: CI

# The whole point of Viceroy is that it builds with nothing to install, on every
# platform — most of all Windows, where the usual libiconv shim does not compile.
# This matrix is the proof. Each platform sources its toolchain the reliable way
# rather than through one action whose version list lags Swift releases.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: swift --version
      - run: swift build
      - run: swift test

  linux:
    name: Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.1", "latest"]   # official Swift Docker images
    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - run: swift build
      - run: swift test

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # compnerd/gha-setup-swift is the authoritative Swift-on-Windows installer
      # (maintained by the Swift-on-Windows lead). Bump branch/tag to move the
      # toolchain version; these must match a real swift.org release.
      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.1-release
          tag: 6.1-RELEASE
      - run: swift --version
      - run: swift build
      - run: swift test

  # Viceroy must stay usable from Embedded Swift: it has to compile for a
  # bare-metal target AND pull no Unicode data tables (libswiftUnicodeDataTables).
  # Both are easy to regress — one `String ==` or a `[String: Key]` is enough —
  # so this job locks them in.
  embedded:
    name: Embedded Swift
    runs-on: macos-latest
    env:
      SWIFT_VERSION: "6.3.2"
    steps:
      - uses: actions/checkout@v4
      # Xcode's bundled toolchain does NOT ship the bare-metal Embedded stdlib —
      # it fails with "unable to load standard library for target
      # arm64-apple-none-macho". Only swift.org toolchains carry
      # usr/lib/swift/embedded (32 targets), so install one explicitly.
      - name: Cache swift.org toolchain package
        id: swiftpkg
        uses: actions/cache@v4
        with:
          path: /tmp/swift.pkg
          key: swift-toolchain-pkg-${{ env.SWIFT_VERSION }}-osx
      - name: Download swift.org toolchain
        if: steps.swiftpkg.outputs.cache-hit != 'true'
        run: |
          curl -fL --retry 3 -o /tmp/swift.pkg \
            "https://download.swift.org/swift-${SWIFT_VERSION}-release/xcode/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-osx.pkg"
      - name: Install toolchain and verify it has the Embedded stdlib
        run: |
          sudo installer -pkg /tmp/swift.pkg -target /
          TC="/Library/Developer/Toolchains/swift-${SWIFT_VERSION}-RELEASE.xctoolchain"
          if [ ! -d "$TC/usr/lib/swift/embedded" ]; then
            echo "::error::$TC has no Embedded stdlib"; exit 1
          fi
          echo "embedded targets: $(ls "$TC/usr/lib/swift/embedded" | wc -l)"
          ls "$TC/usr/lib/swift/embedded" | grep none-macho | head -3
          echo "SWIFTC=$TC/usr/bin/swiftc" >> "$GITHUB_ENV"
      - run: "$SWIFTC --version"
      - name: Compile for Embedded Swift (arm64-apple-none-macho)
        run: |
          mkdir -p /tmp/emb
          # NB: raw swiftc does not define SwiftPM trait conditions, so pass them
          # explicitly. Build BOTH the full set and the UTF-only set — the latter
          # is what proves the `#if` exclusion actually compiles standalone.
          "$SWIFTC" -target arm64-apple-none-macho \
            -enable-experimental-feature Embedded -wmo -parse-as-library -Osize \
            -D Chinese -D Japanese -D Korean -D SingleByte \
            -module-name Viceroy -emit-module -emit-module-path /tmp/emb/Viceroy.swiftmodule \
            -c Sources/Viceroy/*.swift Sources/Viceroy/Decoders/*.swift Sources/Viceroy/Tables/*.swift \
            -o /tmp/emb/viceroy.o
          "$SWIFTC" -target arm64-apple-none-macho \
            -enable-experimental-feature Embedded -wmo -parse-as-library -Osize \
            -c Sources/Viceroy/*.swift Sources/Viceroy/Decoders/*.swift Sources/Viceroy/Tables/*.swift \
            -o /tmp/emb/viceroy-minimal.o
          echo "full:    $(wc -c < /tmp/emb/viceroy.o) bytes"
          echo "UTF-only: $(wc -c < /tmp/emb/viceroy-minimal.o) bytes"
          # The opt-in iconv shim must stay Embedded-clean too.
          "$SWIFTC" -target arm64-apple-none-macho \
            -enable-experimental-feature Embedded -wmo -parse-as-library -Osize \
            -D Chinese -D Japanese -D Korean -D SingleByte \
            -module-name ViceroyIConvCompat -I /tmp/emb \
            -c Sources/ViceroyIConvCompat/*.swift -o /tmp/emb/compat.o
      - name: Assert zero Unicode data-table dependencies
        run: |
          fail=0
          for o in /tmp/emb/viceroy.o /tmp/emb/viceroy-minimal.o /tmp/emb/compat.o; do
            echo "--- undefined symbols in $(basename $o) ---"
            nm -u "$o"
            n=$(nm -u "$o" | grep -cE 'getComposition|getNormData|getDecompositionEntry|nfd_decompositions' || true)
            if [ "$n" != "0" ]; then
              echo "::error::$(basename $o) pulled $n Unicode data-table symbol(s) — Embedded builds must stay libc-only"
              fail=1
            fi
          done
          [ "$fail" = "0" ] && echo "OK — zero Unicode data-table symbols" || exit 1

  # Every trait combination must still compile. The `#if` wiring spans decoders,
  # tables, generated blobs and both dispatch switches — easy to rot silently.
  traits:
    name: Trait matrix
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all (default)
            args: ""
          - name: no Chinese
            args: "--traits Japanese,Korean,SingleByte"
          - name: UTF + SingleByte
            args: "--traits SingleByte"
          - name: UTF only
            args: "--disable-default-traits"
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build (${{ matrix.name }})
        run: swift build -c release ${{ matrix.args }}

  # Belt-and-suspenders: the shipping library must import nothing but the stdlib.
  no-dependencies:
    name: zero-dependency guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert zero imports in shipping sources
        run: |
          if grep -rnE '^\s*import ' Sources/Viceroy; then
            echo "::error::Sources/Viceroy must not import anything"; exit 1
          fi
          echo "OK — Sources/Viceroy imports nothing but the stdlib"
